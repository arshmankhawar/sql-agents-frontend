name: Deploy frontend

# Continuous deployment: every push to main builds the Vite bundle on the
# runner (VITE_API_URL comes from .env.production) and rsyncs the compiled
# dist/ to the droplet, then restarts the PM2-managed `serve` process.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/cd_key
          chmod 600 ~/.ssh/cd_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy dist to droplet
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/cd_key -o IdentitiesOnly=yes" \
            dist/ root@"${{ secrets.DEPLOY_HOST }}":/root/sql-agents-frontend/dist/
          ssh -i ~/.ssh/cd_key -o IdentitiesOnly=yes \
            root@"${{ secrets.DEPLOY_HOST }}" \
            'export PATH=/root/.nvm/versions/node/v24.11.0/bin:$PATH && pm2 restart sql-agents-frontend'

      - name: Health check
        run: |
          sleep 5
          for i in $(seq 1 6); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://arshman.techquest.ai/ || true)
            echo "health attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "::error::Frontend health check did not return 200"; exit 1
